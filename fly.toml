app = 'hayat-api'
primary_region = 'bom'

[build]
  dockerfile = './backend/Dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-4x'
  memory = '4gb'

[env]
  ENVIRONMENT = 'production'

[mounts]
  source = 'hayat_storage'
  destination = '/app/storage'
