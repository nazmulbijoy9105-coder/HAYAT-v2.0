version: "3.9"

services:
  # ─── Application ───
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hayat-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://hayat:hayat_secret@postgres:5432/hayat_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=hayat_neo4j_secret
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=hayat_minio
      - MINIO_SECRET_KEY=hayat_minio_secret
      - MINIO_BUCKET=hayat-documents
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RABBITMQ_URL=amqp://hayat:hayat_rabbit@rabbitmq:5672/
      - JWT_SECRET_KEY=change-me-in-production-hayat-v2-enterprise-key-2026
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      qdrant:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - document_storage:/app/storage
    networks:
      - hayat-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: hayat-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://hayat:hayat_secret@postgres:5432/hayat_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=hayat_neo4j_secret
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=hayat_minio
      - MINIO_SECRET_KEY=hayat_minio_secret
      - MINIO_BUCKET=hayat-documents
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RABBITMQ_URL=amqp://hayat:hayat_rabbit@rabbitmq:5672/
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - postgres
      - neo4j
      - redis
      - opensearch
      - qdrant
      - rabbitmq
      - minio
    volumes:
      - ./backend:/app
      - document_storage:/app/storage
    networks:
      - hayat-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hayat-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - hayat-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: hayat-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    networks:
      - hayat-network
    restart: unless-stopped

  # ─── Databases ───
  postgres:
    image: postgres:16-alpine
    container_name: hayat-postgres
    environment:
      - POSTGRES_USER=hayat
      - POSTGRES_PASSWORD=hayat_secret
      - POSTGRES_DB=hayat_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hayat -d hayat_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hayat-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20-community
    container_name: hayat-neo4j
    environment:
      - NEO4J_AUTH=neo4j/hayat_neo4j_secret
      - NEO4J_PLUGINS=["apoc", "gds"]
      - NEO4J_dbms_memory_heap_initial__size=2G
      - NEO4J_dbms_memory_heap_max__size=4G
      - NEO4J_dbms_memory_pagecache_size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "hayat_neo4j_secret", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - hayat-network
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: hayat-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
      - DISABLE_SECURITY_PLUGIN=true
      - plugins.security.disabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - hayat-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: hayat-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - hayat-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hayat-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hayat-network
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-45Z
    container_name: hayat-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=hayat_minio
      - MINIO_ROOT_PASSWORD=hayat_minio_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - hayat-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: hayat-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=hayat
      - RABBITMQ_DEFAULT_PASS=hayat_rabbit
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - hayat-network
    restart: unless-stopped

  # ─── Observability ───
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: hayat-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - hayat-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: hayat-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=hayat_grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    networks:
      - hayat-network
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  opensearch_data:
  qdrant_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  document_storage:
  prometheus_data:
  grafana_data:

networks:
  hayat-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
