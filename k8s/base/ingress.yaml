apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hayat-ingress
  namespace: hayat
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
    - hosts:
        - api.hayat.legal
        - app.hayat.legal
      secretName: hayat-tls
  rules:
    - host: api.hayat.legal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hayat-api
                port:
                  number: 80
    - host: app.hayat.legal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hayat-frontend
                port:
                  number: 80
